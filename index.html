function useI18n(){const[lang,setLang]=useState(()=>localStorage.getItem('yi_lang')||'zh');const setL=l=>{localStorage.setItem('yi_lang',l);setLang(l);document.documentElement.dir=l==='ar'?'rtl':'ltr'};const t=k=>(T[lang]&&T[lang][k])||(T.en[k])||(T.zh[k])||k;return{lang,setL,t}}
function useTheme(){const[th,setTh]=useState(()=>localStorage.getItem('yi_theme')||'light');useEffect(()=>{document.documentElement.setAttribute('data-theme',th);localStorage.setItem('yi_theme',th)},[th]);const toggle=()=>setTh(t=>t==='light'?'dark':'light');return{th,toggle}}
const Ctx=createContext();
const CAT={'工作':'#5B7B8A','生活':'#7A9E7E','健康':'#C65D3E','学习':'#8B6B8A','社交':'#D4A84B','娱乐':'#C4873B','休息':'#9BB0C4','个人成长':'#6B8F71','其他':'#9C9C9C'};
const ME=['','😢','😞','😕','😐','🙂','😊','😄','😁','🤩','🥳'];
const fd=d=>new Date(d).toISOString().split('T')[0];
const today=()=>fd(new Date());
const fh=h=>`${String(h).padStart(2,'0')}:00`;
let _tid=0;const _tl=new Set();
function toast(m,tp='info'){const t={id:++_tid,m,tp};_tl.forEach(f=>f(t))}
function greeting(t){const h=new Date().getHours();return h<12?t('gm'):h<18?t('ga'):t('ge')}

// ═══ Shared ═══
function ToastBox(){const[l,setL]=useState([]);useEffect(()=>{const f=t=>{setL(p=>[...p,t]);setTimeout(()=>setL(p=>p.filter(x=>x.id!==t.id)),3000)};_tl.add(f);return()=>_tl.delete(f)},[]);return<div className="tbx">{l.map(t=><div key={t.id} className={`tst ${t.tp}`}>{t.m}</div>)}</div>}
function Modal({title,onClose,children,footer}){return<div className="mo" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()}><div className="mh"><h3>{title}</h3><button className="mc" onClick={onClose}>×</button></div><div className="mb">{children}</div>{footer&&<div className="mf">{footer}</div>}</div></div>}

// ═══ Today ═══
function TodayPage(){
  const{t}=useContext(Ctx);const[date,setDate]=useState(today());
  const acts=DB.getActivities();const entries=DB.getEntries(date);const goals=DB.getGoals(date);const moods=DB.getMoods(date);const habits=DB.getHabits();const profile=DB.getProfile();
  const moodRef=useRef(null);const moodInst=useRef(null);
  const[editH,setEditH]=useState(null);
  const[,forceUpdate]=useState(0);const refresh=()=>forceUpdate(x=>x+1);

  // Build timeline
  const timeline=useMemo(()=>{const tl=[];for(let h=0;h<24;h++){const e=entries[h];const act=e?acts.find(a=>a.id===e.activity_id):null;tl.push({hour:h,entry:e,act,isEmpty:!e})}return tl},[entries,acts]);
  const filled=timeline.filter(t=>!t.isEmpty).length;
  const totalMin=timeline.filter(t=>!t.isEmpty).reduce((s,t)=>s+(t.entry.duration_min||60),0);
  const catTime={};timeline.filter(t=>t.act).forEach(t=>{const c=t.act.category;if(!catTime[c])catTime[c]={category:c,minutes:0};catTime[c].minutes+=t.entry.duration_min||60});
  const catArr=Object.values(catTime).sort((a,b)=>b.minutes-a.minutes);
  const goalDone=goals.filter(g=>g.is_completed).length;
  const goalRate=goals.length?Math.round(goalDone/goals.length*100):0;
  const moodAvg=moods.length?Math.round(moods.reduce((s,m)=>s+m.mood_score,0)/moods.length*10)/10:null;

  useEffect(()=>{if(!moodRef.current||moods.length===0)return;if(moodInst.current)moodInst.current.destroy();
    const d=[...moods].sort((a,b)=>a.hour-b.hour);
    moodInst.current=new Chart(moodRef.current.getContext('2d'),{type:'line',data:{labels:d.map(x=>fh(x.hour)),datasets:[{label:t('aMood'),data:d.map(x=>x.mood_score),borderColor:'#C4873B',backgroundColor:'rgba(196,135,59,.08)',fill:true,tension:.4,pointRadius:4,borderWidth:2},{label:'Energy',data:d.map(x=>x.energy_level),borderColor:'#5B7B8A',backgroundColor:'rgba(91,123,138,.06)',fill:true,tension:.4,pointRadius:4,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:12},usePointStyle:true}}},scales:{y:{min:0,max:10,ticks:{stepSize:2,font:{family:'DM Mono',size:11},color:'#9C9C9C'},grid:{color:'var(--b-s)'},border:{display:false}},x:{ticks:{font:{family:'DM Mono',size:11},color:'#9C9C9C'},grid:{display:false},border:{display:false}}}}});
    return()=>{if(moodInst.current)moodInst.current.destroy()}},[moods]);

  const handleSave=(actId)=>{DB.saveEntry(date,editH,{activity_id:actId,duration_min:60,intensity:3});toast(t('saved'),'success');setEditH(null);refresh()};
  const handleToggleGoal=(id)=>{DB.toggleGoal(date,id);refresh()};
  const handleLogHabit=(id)=>{try{DB.logHabit(id,date);toast(t('saved'),'success')}catch(e){toast(e.message,'info')}refresh()};

  return(<div>
    <div className="ph an"><h1>{profile.nickname?`${greeting(t)}，${profile.nickname}`:t('today')}</h1><div className="phs">{new Date().toLocaleDateString(document.documentElement.lang||'zh-CN',{weekday:'long',month:'long',day:'numeric'})}</div><div className="phl"></div></div>
    <div className="g4 an a1" style={{marginBottom:24}}>
      <div className="cd"><div className="sh"><span className="sn">{Math.round(totalMin/60*10)/10}</span><span className="su">{t('hLogged')}</span></div><div className="sd">{filled}/24h</div></div>
      <div className="cd"><div className="sh"><span className="sn">{goalRate}</span><span className="su">%</span></div><div className="sd">{goalDone}/{goals.length} {t('gDone')}</div></div>
      <div className="cd"><div className="sh"><span className="sn">{moodAvg||'—'}</span><span className="su">{t('aMood')}</span></div><div className="sd">{moodAvg?ME[Math.round(moodAvg)]:''} {moods.length}条</div></div>
      <div className="cd"><div className="sh"><span className="sn">0</span><span className="su">{t('dStreak')}</span></div><div className="sd">🔥</div></div>
    </div>
    <div className="cd an a2" style={{marginBottom:24}}>
      <div className="ct">{t('h24')}</div>
      <div className="hb">{timeline.map(({hour:h,entry,act,isEmpty})=><div key={h} className={`hc${isEmpty?' emp':''}`} style={act?{background:act.color+'CC'}:{}} onClick={()=>setEditH(h)} title={act?`${fh(h)}·${act.name}`:`${fh(h)}`}>{act&&<span className="ci">{act.icon}</span>}</div>)}</div>
      <div className="hl"><span>00</span><span>06</span><span>12</span><span>18</span><span>23</span></div>
      {totalMin>0&&<div style={{marginTop:14}}>
        <div className="cb">{catArr.map((c,i)=><div key={i} className="cs" style={{width:`${c.minutes/totalMin*100}%`,background:CAT[c.category]||'#9C9C9C'}}/>)}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>{catArr.map((c,i)=><span key={i} className="ctt" style={{background:(CAT[c.category]||'#9C9C9C')+'18',color:CAT[c.category]||'#9C9C9C'}}>{c.category} {Math.round(c.minutes/60*10)/10}h</span>)}</div>
      </div>}
    </div>
    <div className="gt an a3" style={{marginBottom:24}}>
      <div className="cd"><div className="ct">{t('tDetail')}</div>
        {timeline.filter(t=>!t.isEmpty).length===0?<div className="empty"><div className="empty-i">📝</div><div className="empty-t">{t('noRec')}</div></div>
        :timeline.filter(t=>t.act).map(({hour:h,entry,act})=><div key={h} className="tr"><span className="tt">{fh(h)}</span><div className="ti" style={{background:act.color+'22'}}>{act.icon}</div><div style={{flex:1,minWidth:0}}><div className="tn">{act.name}</div>{entry.note&&<div className="tnote">{entry.note}</div>}</div><div className="td">{[1,2,3,4,5].map(i=><div key={i} className={`dot${i<=entry.intensity?' f':''}`}/>)}</div></div>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        <div className="cd"><div className="ct">{t('tGoals')}</div>
          {goals.length===0?<div className="empty"><div className="empty-t">{t('noGoals')}</div></div>
          :goals.map(g=><div key={g.id} className="gi"><div className={`gc${g.is_completed?' done':''}`} onClick={()=>handleToggleGoal(g.id)}>{g.is_completed?'✓':''}</div><div style={{flex:1}}><div className={`gtn${g.is_completed?' done':''}`}>{g.title}</div></div></div>)}
        </div>
        <div className="cd"><div className="ct">{t('hCheck')}</div>
          {habits.map(h=><div key={h.id} className="hr"><div className={`hd${h.logs?.find(l=>l.date===date)?' done':''}`} onClick={()=>handleLogHabit(h.id)}>{h.logs?.find(l=>l.date===date)?'✓':''}</div><span className="hi">{h.icon}</span><span className="hn">{h.name}</span>{h.streak>0&&<span className="hst">🔥 {h.streak}</span>}</div>)}
        </div>
      </div>
    </div>
    {moods.length>0&&<div className="cd an a4" style={{marginBottom:24}}><div className="ct">{t('mCurve')}</div><div className="cw"><canvas ref={moodRef}></canvas></div></div>}
    {editH!==null&&<Modal title={`${t('record')} ${fh(editH)}`} onClose={()=>setEditH(null)}>
      <div className="ap">{acts.map(a=><div key={a.id} className="ao" onClick={()=>handleSave(a.id)}><span className="ai">{a.icon}</span><span className="an">{a.name}</span></div>)}</div>
    </Modal>}
  </div>);
}

    <div className="ph an"><h1>{t('habits')}</h1><div className="phl"></div></div>
    <div className="cd an a1">
      <div className="wg"><div></div>{weekDates.map((d,i)=>{const dd=new Date(d);return<div key={i} className="wh">{dn[dd.getDay()]}<br/><span style={{fontSize:10}}>{dd.getDate()}</span></div>})}<div className="wh">streak</div>
      {habits.map(h=><React.Fragment key={h.id}>
        <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>{h.icon}</span><span style={{fontSize:13,fontWeight:500}}>{h.name}</span></div>
        {weekDates.map((d,i)=>{const log=h.logs?.find(l=>l.date===d);const isT=d===date;return<div key={i} className={`wd${log?' done':''}${isT?' today':''}`} onClick={()=>isT&&handleLog(h.id)}>{log?'✓':''}</div>})}
        <div style={{fontFamily:'DM Mono',fontSize:12,color:'var(--amber)',textAlign:'right'}}>{h.streak>0?`${h.streak}天`:'—'}{h.streak>=7&&' 🔥'}</div>
      </React.Fragment>)}</div>
      {habits.length===0&&<div className="empty"><div className="empty-t">{t('noHab')}</div></div>}
    </div>
  </div>);
}

// ═══ Diary ═══
function DiaryPage(){const{t}=useContext(Ctx);const[date,setDate]=useState(today());const[content,setContent]=useState('');const timer=useRef(null);
  useEffect(()=>{const d=DB.getDiary(date);setContent(d.content||'')},[date]);
  const autoSave=val=>{setContent(val);clearTimeout(timer.current);timer.current=setTimeout(()=>DB.saveDiary(date,val),2000)};
  const entries=useMemo(()=>DB.getDiaryMonth(date.slice(0,7)),[date]);
  return(<div>
    <div className="ph an"><h1>{t('diary')}</h1><div className="phl"></div></div>
    <div className="an a1" style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
      <button className="btn btn-s" onClick={()=>setDate(fd(new Date(new Date(date).getTime()-864e5)))}>◀</button>
      <input type="date" className="inp" style={{width:160}} value={date} onChange={e=>setDate(e.target.value)}/>
      <button className="btn btn-s" onClick={()=>setDate(fd(new Date(new Date(date).getTime()+864e5)))}>▶</button>
      <button className="btn btn-s" onClick={()=>setDate(today())}>{t('today')}</button>
      <span style={{marginLeft:'auto',fontSize:12,color:'var(--ink-3)'}}>{content.replace(/\s/g,'').length} {t('wCount')} · {t('autoSave')}</span>
    </div>
    <textarea className="da an a2" placeholder={t('diaryPh')} value={content} onChange={e=>autoSave(e.target.value)}/>
    {entries.length>0&&<div className="an a3" style={{marginTop:20}}>
      <div className="ct">本月 ({entries.length}篇)</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{entries.map(e=><div key={e.date} onClick={()=>setDate(e.date)} style={{padding:'8px 14px',borderRadius:8,border:'1px solid var(--b-s)',cursor:'pointer',fontSize:13,background:e.date===date?'var(--acc-l)':'var(--bg-p)',color:e.date===date?'var(--acc)':'var(--ink-1)',transition:'all .15s'}}>{e.date.slice(5)} · {e.word_count||0}字</div>)}</div>
    </div>}
  </div>);
}

// ═══ Profile ═══
function ProfilePage(){const{t}=useContext(Ctx);const AV=['😊','😎','🤓','😇','🥳','🧑‍💻','👨‍🎨','🧑‍🔬','👩‍🍳','🧑‍🚀','🦊','🐱','🐼','🐨','🦁','🐻','🌟','🌙','☀️','🌈','🎭','🎪','🏔️','🌊'];
  const[form,setForm]=useState(DB.getProfile());const[showAv,setShowAv]=useState(false);
  return(<div>
    <div className="ph an"><h1>{t('profile')}</h1><div className="phl"></div></div>
    <div className="g2">
      <div className="cd an a1">
        <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:24}}>
          <div onClick={()=>setShowAv(!showAv)} style={{width:72,height:72,borderRadius:16,background:'var(--bg-i)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,cursor:'pointer',border:'2px solid var(--b-s)'}}>{form.avatar||'😊'}</div>
          <div><div style={{fontFamily:'Playfair Display',serif,fontSize:24,fontWeight:600}}>{form.nickname||'—'}</div><div style={{fontSize:13,color:'var(--ink-3)'}}>{form.job||''}{form.city?` · ${form.city}`:''}</div></div>
        </div>
        {showAv&&<div className="ag" style={{marginBottom:20}}>{AV.map(a=><div key={a} className={`ao2${form.avatar===a?' sel':''}`} onClick={()=>{setForm({...form,avatar:a});setShowAv(false)}}>{a}</div>)}</div>}
        <div className="fg"><label className="fl">{t('nickname')}</label><input className="inp" value={form.nickname||''} onChange={e=>setForm({...form,nickname:e.target.value})}/></div>
        <div className="g2"><div className="fg"><label className="fl">{t('birthday')}</label><input type="date" className="inp" value={form.birthday||''} onChange={e=>setForm({...form,birthday:e.target.value})}/></div><div className="fg"><label className="fl">{t('job')}</label><input className="inp" value={form.job||''} onChange={e=>setForm({...form,job:e.target.value})}/></div></div>
        <div className="fg"><label className="fl">{t('city')}</label><input className="inp" value={form.city||''} onChange={e=>setForm({...form,city:e.target.value})}/></div>
        <button className="btn btn-a" onClick={()=>{DB.saveProfile(form);toast(t('saved'),'success')}}>{t('save')}</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        <div className="cd an a2"><div className="ct">{t('motto')}</div><textarea className="inp" rows={3} style={{resize:'vertical'}} value={form.motto||''} onChange={e=>setForm({...form,motto:e.target.value})}/></div>
        <div className="cd an a3"><div className="ct">{t('aGoal')}</div><textarea className="inp" rows={4} style={{resize:'vertical'}} value={form.aGoal||''} onChange={e=>setForm({...form,aGoal:e.target.value})}/></div>
      </div>
    </div>
  </div>);
}

// ═══ Settings ═══
function SettingsPage(){const{t,lang,setL}=useContext(Ctx);const{th,toggleTheme}=useTheme();const[showLang,setShowLang]=useState(false);
  const[notifH,setNotifH]=useState(localStorage.getItem('yi_notif_h')==='true');const[notifE,setNotifE]=useState(localStorage.getItem('yi_notif_e')==='true');
  const handleExport=()=>{const data=DB.exportJSON();const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`yi-tian-${today()}.json`;a.click();URL.revokeObjectURL(u);toast(t('saved'),'success')};
  const handleImport=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const json=JSON.parse(await f.text());DB.importJSON(json);toast(t('saved'),'success')}catch(err){toast('Error','error')}};inp.click()};
  const toggleN=async tp=>{if(tp==='h'){const v=!notifH;setNotifH(v);localStorage.setItem('yi_notif_h',v);if(v&&'Notification'in window&&Notification.permission!=='granted')await Notification.requestPermission()}if(tp==='e'){const v=!notifE;setNotifE(v);localStorage.setItem('yi_notif_e',v);if(v&&'Notification'in window&&Notification.permission!=='granted')await Notification.requestPermission()}};
  return(<div>
    <div className="ph an"><h1>{t('settings')}</h1><div className="phl"></div></div>
    <div className="g2 an a1">
      <div className="cd"><div className="ct">{t('pref')}</div>
        <div className="fg"><label className="fl">{t('language')}</label><button className="btn" onClick={()=>setShowLang(true)} style={{width:'100%',justifyContent:'flex-start'}}>{LANGS.find(l=>l.code===lang)?.f} {LANGS.find(l=>l.code===lang)?.n}</button></div>
        <div className="fg"><label className="fl">{t('darkMode')}</label><button className="btn" onClick={toggleTheme} style={{width:'100%',justifyContent:'flex-start'}}>{th==='dark'?'☀️':'🌙'} {th==='dark'?'Dark':'Light'}</button></div>
      </div>
      <div className="cd"><div className="ct">{t('data')}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <button className="btn" onClick={handleExport}>📄 {t('exportJSON')}</button>
          <button className="btn" onClick={handleImport}>📥 {t('importJSON')}</button>
        </div>
      </div>
    </div>
    <div className="cd an a2" style={{marginTop:20}}><div className="ct">{t('notif')}</div>
      <div className="nr"><span style={{flex:1}}>🔔 每小时提醒</span><button className={`tg${notifH?' on':''}`} onClick={()=>toggleN('h')}/></div>
      <div className="nr"><span style={{flex:1}}>🌙 晚间总结</span><button className={`tg${notifE?' on':''}`} onClick={()=>toggleN('e')}/></div>
    </div>
    <div className="cd an a3" style={{marginTop:20}}><div className="ct">{t('about')}</div>
      <div style={{fontSize:14,color:'var(--ink-2)',lineHeight:1.8}}><p style={{fontFamily:'Playfair Display',serif,fontSize:20,fontWeight:600}}>一天 · Yi Tian</p><p>v2.0 Static · 24小时生命画布</p><p style={{fontSize:12,color:'var(--ink-3)',marginTop:8}}>React 18 · Chart.js · localStorage · 20 Languages</p></div>
    </div>
    {showLang&&<Modal title={t('language')} onClose={()=>setShowLang(false)}>
      <div className="lg">{LANGS.map(l=><div key={l.code} className={`lo${lang===l.code?' act':''}`} onClick={()=>{setL(l.code);setShowLang(false)}}><div className="lf">{l.f}</div><div className="ln">{l.n}</div></div>)}</div>
    </Modal>}
  </div>);
}

// ═══ Search ═══
function SearchOverlay({onClose,onNavigate,t}){
  const[q,setQ]=useState('');const ref=useRef(null);const acts=DB.getActivities();
  useEffect(()=>{ref.current?.focus()},[]);
  const results=useMemo(()=>{if(!q.trim())return[];const s=q.toLowerCase();const m=[];
    acts.filter(a=>a.name.toLowerCase().includes(s)).slice(0,5).forEach(a=>m.push({icon:a.icon,label:a.name,sub:a.category}));
    [{icon:'◉',label:t('today'),p:'today'},{icon:'≡',label:t('timeline'),p:'timeline'},{icon:'◈',label:t('insights'),p:'insights'},{icon:'✎',label:t('diary'),p:'diary'}].filter(p=>p.label.toLowerCase().includes(s)).forEach(p=>m.push(p));
    return m},[q,acts,t]);
  return<div className="sov" onClick={onClose}><div className="sob" onClick={e=>e.stopPropagation()}>
    <input ref={ref} className="sin" placeholder={t('search')} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Escape')onClose();if(e.key==='Enter'&&results[0]?.p){onNavigate(results[0].p);onClose()}}}/>
    {results.length>0&&<div className="sre">{results.map((r,i)=><div key={i} className="sri" onClick={()=>{if(r.p){onNavigate(r.p);onClose()}}}><span>{r.icon}</span><span>{r.label}</span>{r.sub&&<span style={{marginLeft:'auto',fontSize:12,color:'var(--ink-3)'}}>{r.sub}</span>}</div>)}</div>}
    {q&&results.length===0&&<div style={{padding:20,textAlign:'center',color:'var(--ink-3)',fontSize:13}}>{t('noRes')}</div>}
  </div></div>;
}

// ═══ App ═══
function App(){
  const{lang,setL,t}=useI18n();const{th,toggle:toggleTheme}=useTheme();
  const[page,setPage]=useState('today');const[time,setTime]=useState(new Date());const[showSearch,setShowSearch]=useState(false);
  const profile=DB.getProfile();
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setShowSearch(true)}if(e.key==='Escape')setShowSearch(false);if((e.metaKey||e.ctrlKey)&&e.key>='1'&&e.key<='7'){e.preventDefault();setPage(['today','timeline','insights','activities','habits','diary','settings'][parseInt(e.key)-1])}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[]);
  useEffect(()=>{const check=()=>{const now=new Date();const h=now.getHours();const m=now.getMinutes();
    if(localStorage.getItem('yi_notif_h')==='true'&&m===0&&h>=9&&h<=22&&'Notification'in window&&Notification.permission==='granted')new Notification('一天',{body:`${fh(h)} — 记录一下？`});
    if(localStorage.getItem('yi_notif_e')==='true'&&h===21&&m===0&&'Notification'in window&&Notification.permission==='granted')new Notification('一天',{body:'该写总结了 📝'})};
    const i=setInterval(check,60000);return()=>clearInterval(i)},[]);
  const ts=time.toLocaleTimeString(document.documentElement.lang==='ar'?'ar-SA':'zh-CN',{hour12:false});
  const ds=time.toLocaleDateString(document.documentElement.lang||'zh-CN',{month:'short',day:'numeric'});
  const nav=[{id:'today',i:'◉',l:t('today')},{id:'timeline',i:'≡',l:t('timeline')},{id:'insights',i:'◈',l:t('insights')},{id:'activities',i:'▦',l:t('activities')},{id:'habits',i:'◎',l:t('habits')},{id:'diary',i:'✎',l:t('diary')},{id:'profile',i:'☺',l:t('profile')},{id:'settings',i:'⚙',l:t('settings')}];
  return(<Ctx.Provider value={{lang,setL,t,th,toggleTheme}}>
    <div className="app">
      <nav className="sb"><div className="sbb"><div className="bi">{profile.avatar||'一'}</div><span className="bt">一天</span></div>
        <div className="sbn">{nav.map(n=><div key={n.id} className={`ni${page===n.id?' act':''}`} onClick={()=>setPage(n.id)}><span className="ico">{n.i}</span><span className="lbl">{n.l}</span></div>)}</div>
        <div className="sbf"><div className="clk">{ts}</div><div className="cld">{ds}</div><button className="tb" onClick={toggleTheme} title={t('darkMode')}>{th==='dark'?'☀️':'🌙'}</button><button className="lb">{LANGS.find(l=>l.code===lang)?.f}</button></div>
      </nav>
      <main className="mn">
        {page==='today'&&<TodayPage/>}{page==='timeline'&&<TimelinePage/>}{page==='insights'&&<InsightsPage/>}{page==='activities'&&<ActivitiesPage/>}
        {page==='habits'&&<HabitsPage/>}{page==='diary'&&<DiaryPage/>}{page==='profile'&&<ProfilePage/>}{page==='settings'&&<SettingsPage/>}
      </main>
      <ToastBox/>{showSearch&&<SearchOverlay onClose={()=>setShowSearch(false)} onNavigate={p=>setPage(p)} t={t}/>}
    </div>
  </Ctx.Provider>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
