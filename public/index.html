<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一天 · Yi Tian — 24小时生命画布</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════
       一天 · 设计系统（Design System）
       ═══════════════════════════════════════════════════════════ */

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --bg-card: rgba(26, 26, 46, 0.8);
      --bg-hover: rgba(255, 255, 255, 0.05);
      --bg-active: rgba(255, 255, 255, 0.08);
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0b8;
      --text-muted: #6b6b80;
      --accent-blue: #4A90D9;
      --accent-purple: #7C3AED;
      --accent-pink: #EC4899;
      --accent-green: #10B981;
      --accent-orange: #F59E0B;
      --accent-red: #EF4444;
      --accent-teal: #14B8A6;
      --accent-indigo: #6366F1;
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --sidebar-width: 240px;
      --header-height: 60px;
      --transition: all 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── 滚动条 ─── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* ─── 布局 ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .sidebar-logo .logo-text h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .sidebar-logo .logo-text p {
      font-size: 11px;
      color: var(--text-muted);
    }

    .sidebar-nav {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: 8px;
    }

    .nav-section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 12px 4px;
      letter-spacing: 0.5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-secondary);
      font-size: 14px;
      position: relative;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: rgba(74, 144, 217, 0.15);
      color: var(--accent-blue);
    }

    .nav-item .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .nav-item .nav-badge {
      margin-left: auto;
      background: var(--accent-blue);
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border-color);
    }

    .sidebar-time {
      text-align: center;
      padding: 8px;
    }

    .sidebar-time .time-display {
      font-size: 28px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }

    .sidebar-time .date-display {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── 主内容区 ─── */
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      min-height: 100vh;
    }

    .main-header {
      height: var(--header-height);
      background: rgba(15, 15, 26, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .main-header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ─── 卡片 ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      transition: var(--transition);
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── 网格布局 ─── */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    @media (max-width: 1200px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    /* ─── 统计卡片 ─── */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .stat-info .stat-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-info .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── 按钮 ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
    .btn-primary:hover { background: #3a7bc8; }
    .btn-success { background: var(--accent-green); border-color: var(--accent-green); color: white; }
    .btn-danger { background: var(--accent-red); border-color: var(--accent-red); color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 6px; width: 32px; height: 32px; justify-content: center; }

    /* ─── 输入框 ─── */
    .input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition);
    }

    .input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .input::placeholder { color: var(--text-muted); }

    /* ─── 标签 ─── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ─── 进度条 ─── */
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ─── 时间轴 ─── */
    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      gap: 3px;
    }

    .timeline-hour {
      aspect-ratio: 1;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      border: 2px solid transparent;
    }

    .timeline-hour:hover {
      transform: scale(1.05);
      z-index: 2;
    }

    .timeline-hour.empty {
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
    }

    .timeline-hour.empty:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
    }

    .timeline-hour.current {
      border-color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(74, 144, 217, 0.3);
    }

    .timeline-hour .hour-label {
      font-size: 10px;
      color: var(--text-muted);
      position: absolute;
      bottom: 2px;
    }

    .timeline-hour .hour-icon {
      font-size: 20px;
    }

    .timeline-hour .hour-name {
      font-size: 9px;
      color: rgba(255,255,255,0.8);
      text-align: center;
      margin-top: 2px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 2px;
    }

    @media (max-width: 900px) {
      .timeline-grid { grid-template-columns: repeat(12, 1fr); }
    }
    @media (max-width: 500px) {
      .timeline-grid { grid-template-columns: repeat(8, 1fr); }
    }

    /* ─── 详细时间轴列表 ─── */
    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .timeline-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      cursor: pointer;
    }

    .timeline-row:hover {
      background: var(--bg-hover);
    }

    .timeline-row .row-hour {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      width: 48px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .timeline-row .row-icon {
      font-size: 24px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .timeline-row .row-info {
      flex: 1;
      min-width: 0;
    }

    .timeline-row .row-name {
      font-size: 14px;
      font-weight: 500;
    }

    .timeline-row .row-note {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-row .row-empty {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    .timeline-row .row-intensity {
      display: flex;
      gap: 2px;
    }

    .intensity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }

    .intensity-dot.filled {
      background: var(--accent-blue);
    }

    /* ─── 活动选择器 ─── */
    .activity-picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }

    .activity-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      border: 2px solid transparent;
      text-align: center;
    }

    .activity-option:hover {
      background: var(--bg-hover);
    }

    .activity-option.selected {
      border-color: var(--accent-blue);
      background: rgba(74, 144, 217, 0.1);
    }

    .activity-option .act-icon {
      font-size: 28px;
    }

    .activity-option .act-name {
      font-size: 11px;
      color: var(--text-secondary);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── 心情追踪 ─── */
    .mood-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .mood-option {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: var(--transition);
      border: 2px solid transparent;
      background: rgba(255,255,255,0.05);
    }

    .mood-option:hover { transform: scale(1.15); }
    .mood-option.selected {
      border-color: var(--accent-yellow, #F59E0B);
      background: rgba(245, 158, 11, 0.15);
    }

    /* ─── 习惯列表 ─── */
    .habit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .habit-item:hover { background: var(--bg-hover); }

    .habit-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
      flex-shrink: 0;
    }

    .habit-check.done {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    .habit-streak {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent-orange);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── 目标 ─── */
    .goal-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .goal-item:last-child { border-bottom: none; }

    .goal-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 12px;
    }

    .goal-check.done {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    .goal-info { flex: 1; }
    .goal-title { font-size: 14px; }
    .goal-title.done { text-decoration: line-through; color: var(--text-muted); }
    .goal-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ─── 对话框/模态 ─── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-header h3 { font-size: 18px; }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
    }
    .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }

    .modal-body { margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }

    /* ─── 评分滑块 ─── */
    .score-slider {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-bar {
      flex: 1;
      display: flex;
      gap: 3px;
    }

    .score-block {
      flex: 1;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
      opacity: 0.3;
    }

    .score-block.active { opacity: 1; }

    .score-value {
      font-size: 16px;
      font-weight: 600;
      width: 28px;
      text-align: center;
    }

    /* ─── 图表容器 ─── */
    .chart-container {
      position: relative;
      height: 250px;
      width: 100%;
    }

    /* ─── 空状态 ─── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state .empty-text {
      font-size: 14px;
    }

    /* ─── 加载动画 ─── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 通知 ─── */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }

    .toast.success { border-left: 3px solid var(--accent-green); }
    .toast.error { border-left: 3px solid var(--accent-red); }
    .toast.info { border-left: 3px solid var(--accent-blue); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ─── 页面标题区 ─── */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* ─── 分类颜色条 ─── */
    .category-bar {
      display: flex;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 8px;
    }

    .category-segment {
      transition: width 0.5s ease;
      min-width: 2px;
    }

    /* ─── 分类标签 ─── */
    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════
    //  API 服务层
    // ═══════════════════════════════════════════════════════════

    const API_BASE = '/api';

    const api = {
      async request(path, options = {}) {
        const url = `${API_BASE}${path}`;
        const config = {
          headers: { 'Content-Type': 'application/json', ...options.headers },
          ...options,
        };
        if (config.body && typeof config.body === 'object') {
          config.body = JSON.stringify(config.body);
        }
        const res = await fetch(url, config);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '请求失败');
        return data;
      },

      // 活动
      getActivities: (params = '') => api.request(`/activities${params ? '?' + params : ''}`),
      createActivity: (data) => api.request('/activities', { method: 'POST', body: data }),
      updateActivity: (id, data) => api.request(`/activities/${id}`, { method: 'PUT', body: data }),
      toggleFavorite: (id) => api.request(`/activities/${id}/favorite`, { method: 'PATCH' }),
      deleteActivity: (id) => api.request(`/activities/${id}?force=true`, { method: 'DELETE' }),
      getCategories: () => api.request('/activities/categories'),

      // 时间轴
      getTimeline: (date) => api.request(`/timeline/${date}`),
      saveEntry: (data) => api.request('/timeline', { method: 'POST', body: data }),
      deleteEntry: (date, hour) => api.request(`/timeline/${date}/${hour}`, { method: 'DELETE' }),

      // 目标
      getGoals: (date) => api.request(`/goals/${date}`),
      createGoal: (data) => api.request('/goals', { method: 'POST', body: data }),
      toggleGoal: (id) => api.request(`/goals/${id}/complete`, { method: 'PATCH' }),
      deleteGoal: (id) => api.request(`/goals/${id}`, { method: 'DELETE' }),

      // 心情
      getMoods: (date) => api.request(`/moods/${date}`),
      saveMood: (data) => api.request('/moods', { method: 'POST', body: data }),

      // 习惯
      getHabits: () => api.request('/habits'),
      createHabit: (data) => api.request('/habits', { method: 'POST', body: data }),
      logHabit: (id, data = {}) => api.request(`/habits/${id}/log`, { method: 'POST', body: data }),

      // 统计
      getOverview: () => api.request('/stats/overview'),
      getDailyStats: (date) => api.request(`/stats/daily/${date}`),
      getWeeklyStats: (date) => api.request(`/stats/weekly/${date}`),
      getMonthlyStats: (year, month) => api.request(`/stats/monthly/${year}/${month}`),
      exportData: (format = 'json') => api.request(`/stats/export?format=${format}`),

      // 总结
      getSummary: (date) => api.request(`/summaries/${date}`),
      saveSummary: (data) => api.request('/summaries', { method: 'POST', body: data }),

      // 设置
      getSettings: () => api.request('/settings'),
      updateSettings: (data) => api.request('/settings', { method: 'PUT', body: data }),

      // 系统
      getSystemStats: () => api.request('/system/stats'),
    };

    // ═══════════════════════════════════════════════════════════
    //  工具函数
    // ═══════════════════════════════════════════════════════════

    const formatDate = (d) => {
      const date = d instanceof Date ? d : new Date(d);
      return date.toISOString().split('T')[0];
    };

    const today = () => formatDate(new Date());

    const formatTime = (h) => `${String(h).padStart(2, '0')}:00`;

    const MOOD_EMOJIS = ['','😢','😞','😕','😐','🙂','😊','😄','😁','🤩','🥳'];
    const ENERGY_EMOJIS = ['','😴','🥱','😑','😌','🙂','😊','💪','🔥','⚡','🚀'];

    // ═══════════════════════════════════════════════════════════
    //  Toast 通知系统
    // ═══════════════════════════════════════════════════════════

    let toastId = 0;
    const toastListeners = new Set();

    function showToast(message, type = 'info') {
      const toast = { id: ++toastId, message, type };
      toastListeners.forEach(fn => fn(toast));
    }

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);

      useEffect(() => {
        const handler = (toast) => {
          setToasts(prev => [...prev, toast]);
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== toast.id));
          }, 3000);
        };
        toastListeners.add(handler);
        return () => toastListeners.delete(handler);
      }, []);

      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast ${t.type}`}>
              {t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️'} {t.message}
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  模态对话框组件
    // ═══════════════════════════════════════════════════════════

    function Modal({ title, onClose, children, footer }) {
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3>{title}</h3>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">{children}</div>
            {footer && <div className="modal-footer">{footer}</div>}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  仪表板页面
    // ═══════════════════════════════════════════════════════════

    function DashboardPage() {
      const [date, setDate] = useState(today());
      const [timeline, setTimeline] = useState([]);
      const [stats, setStats] = useState(null);
      const [goals, setGoals] = useState({ goals: [], completed: 0, total: 0, completionRate: 0 });
      const [moods, setMoods] = useState({ moods: [], averages: null });
      const [overview, setOverview] = useState(null);
      const [habits, setHabits] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editHour, setEditHour] = useState(null);
      const [activities, setActivities] = useState([]);

      const loadData = useCallback(async () => {
        setLoading(true);
        try {
          const [tl, goalsData, moodData, overviewData, habitsData, actData] = await Promise.all([
            api.getTimeline(date),
            api.getGoals(date),
            api.getMoods(date),
            api.getOverview(),
            api.getHabits(),
            api.getActivities(),
          ]);
          setTimeline(tl.data.timeline);
          setStats(tl.data.stats);
          setGoals(goalsData.data);
          setMoods(moodData.data);
          setOverview(overviewData.data);
          setHabits(habitsData.data);
          setActivities(actData.data.activities);
        } catch (err) {
          showToast('加载数据失败: ' + err.message, 'error');
        }
        setLoading(false);
      }, [date]);

      useEffect(() => { loadData(); }, [loadData]);

      const currentHour = new Date().getHours();

      const handleTimelineClick = (hour) => {
        setEditHour(hour);
      };

      const handleSaveEntry = async (activityId) => {
        try {
          await api.saveEntry({ date, hour: editHour, activity_id: activityId, duration_min: 60, intensity: 3 });
          showToast(`${formatTime(editHour)} 记录已保存`, 'success');
          setEditHour(null);
          loadData();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleDeleteEntry = async (hour) => {
        try {
          await api.deleteEntry(date, hour);
          showToast('记录已删除', 'success');
          loadData();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleToggleGoal = async (goalId) => {
        try {
          await api.toggleGoal(goalId);
          loadData();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleToggleHabit = async (habitId) => {
        try {
          await api.logHabit(habitId, { date });
          showToast('习惯已打卡', 'success');
          loadData();
        } catch (err) {
          if (err.message.includes('已存在')) {
            showToast('今天已经打卡过了', 'info');
          } else {
            showToast(err.message, 'error');
          }
        }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      const categoryTime = stats?.categoryTime || [];
      const totalMinutes = stats?.totalMinutes || 0;

      return (
        <div>
          <div className="page-header">
            <h2>📊 仪表板</h2>
            <p>今日概览 · {date}</p>
          </div>

          {/* 日期导航 */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '20px' }}>
            <button className="btn btn-sm" onClick={() => setDate(formatDate(new Date(new Date(date).getTime() - 86400000)))}>◀</button>
            <input type="date" className="input" style={{ width: '160px' }} value={date} onChange={e => setDate(e.target.value)} />
            <button className="btn btn-sm" onClick={() => setDate(formatDate(new Date(new Date(date).getTime() + 86400000)))}>▶</button>
            <button className="btn btn-sm" onClick={() => setDate(today())}>今天</button>
          </div>

          {/* 概览统计 */}
          <div className="grid-4" style={{ marginBottom: '20px' }}>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(74, 144, 217, 0.15)' }}>⏰</div>
              <div className="stat-info">
                <div className="stat-value">{stats?.totalHours || 0}h</div>
                <div className="stat-label">已记录时间</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(16, 185, 129, 0.15)' }}>🎯</div>
              <div className="stat-info">
                <div className="stat-value">{goals.completionRate}%</div>
                <div className="stat-label">目标完成率 ({goals.completed}/{goals.total})</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(245, 158, 11, 0.15)' }}>
                {MOOD_EMOJIS[Math.round(moods.averages?.mood_score || 5)] || '🙂'}
              </div>
              <div className="stat-info">
                <div className="stat-value">{moods.averages?.mood_score || '-'}</div>
                <div className="stat-label">平均心情</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(124, 58, 237, 0.15)' }}>🔥</div>
              <div className="stat-info">
                <div className="stat-value">{overview?.currentStreak || 0}</div>
                <div className="stat-label">连续记录天数</div>
              </div>
            </div>
          </div>

          {/* 24小时时间轴 */}
          <div className="card" style={{ marginBottom: '20px' }}>
            <div className="card-header">
              <div className="card-title">⏰ 24小时时间轴</div>
              <div className="card-subtitle">{stats?.filledHours || 0}/24 小时已记录</div>
            </div>
            <div className="timeline-grid">
              {timeline.map(({ hour, entry, isEmpty }) => (
                <div
                  key={hour}
                  className={`timeline-hour ${isEmpty ? 'empty' : ''} ${hour === currentHour ? 'current' : ''}`}
                  style={entry ? { background: entry.activity_color + '33' } : {}}
                  onClick={() => handleTimelineClick(hour)}
                  title={entry ? `${entry.activity_name}\n${entry.note || ''}` : `${formatTime(hour)} - 空闲`}
                >
                  {!isEmpty && <span className="hour-icon">{entry.activity_icon}</span>}
                  {!isEmpty && <span className="hour-name">{entry.activity_name}</span>}
                  {isEmpty && <span className="hour-icon" style={{ opacity: 0.3 }}>+</span>}
                  <span className="hour-label">{hour}</span>
                </div>
              ))}
            </div>
            {/* 分类时间条 */}
            {totalMinutes > 0 && (
              <div style={{ marginTop: '12px' }}>
                <div className="category-bar">
                  {categoryTime.map((cat, i) => (
                    <div key={i} className="category-segment" style={{
                      width: `${(cat.total_minutes / totalMinutes * 100)}%`,
                      background: cat.color,
                    }} title={`${cat.category}: ${Math.round(cat.total_minutes/60*10)/10}h`} />
                  ))}
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginTop: '8px' }}>
                  {categoryTime.map((cat, i) => (
                    <span key={i} className="category-tag" style={{ background: cat.color + '22', color: cat.color }}>
                      {cat.category} {Math.round(cat.total_minutes/60*10)/10}h
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* 目标和习惯 */}
          <div className="grid-2" style={{ marginBottom: '20px' }}>
            {/* 今日目标 */}
            <div className="card">
              <div className="card-header">
                <div className="card-title">🎯 今日目标</div>
                <div className="card-subtitle">{goals.completed}/{goals.total}</div>
              </div>
              {goals.goals.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">🎯</div><div className="empty-text">还没有设置今日目标</div></div>
              ) : (
                goals.goals.map(goal => (
                  <div key={goal.id} className="goal-item">
                    <div className={`goal-check ${goal.is_completed ? 'done' : ''}`} onClick={() => handleToggleGoal(goal.id)}>
                      {goal.is_completed ? '✓' : ''}
                    </div>
                    <div className="goal-info">
                      <div className={`goal-title ${goal.is_completed ? 'done' : ''}`}>{goal.title}</div>
                      <div className="goal-meta">{goal.category} · 优先级 {goal.priority}</div>
                    </div>
                  </div>
                ))
              )}
            </div>

            {/* 习惯打卡 */}
            <div className="card">
              <div className="card-header">
                <div className="card-title">✅ 习惯打卡</div>
              </div>
              {habits.length === 0 ? (
                <div className="empty-state"><div className="empty-icon">✅</div><div className="empty-text">还没有设置习惯</div></div>
              ) : (
                habits.map(habit => (
                  <div key={habit.id} className="habit-item">
                    <div className={`habit-check ${habit.isCompletedToday ? 'done' : ''}`} onClick={() => handleToggleHabit(habit.id)}>
                      {habit.isCompletedToday ? '✓' : ''}
                    </div>
                    <span style={{ fontSize: '18px' }}>{habit.icon}</span>
                    <span style={{ flex: 1, fontSize: '14px' }}>{habit.name}</span>
                    {habit.streak > 0 && (
                      <span className="habit-streak">🔥 {habit.streak}天</span>
                    )}
                  </div>
                ))
              )}
            </div>
          </div>

          {/* 总览统计 */}
          {overview && (
            <div className="grid-3" style={{ marginBottom: '20px' }}>
              <div className="stat-card">
                <div className="stat-icon" style={{ background: 'rgba(14, 184, 166, 0.15)' }}>📅</div>
                <div className="stat-info">
                  <div className="stat-value">{overview.dayCount}</div>
                  <div className="stat-label">总记录天数</div>
                </div>
              </div>
              <div className="stat-card">
                <div className="stat-icon" style={{ background: 'rgba(236, 72, 153, 0.15)' }}>📝</div>
                <div className="stat-info">
                  <div className="stat-value">{overview.totalEntries}</div>
                  <div className="stat-label">总记录条数</div>
                </div>
              </div>
              <div className="stat-card">
                <div className="stat-icon" style={{ background: 'rgba(99, 102, 241, 0.15)' }}>⏱️</div>
                <div className="stat-info">
                  <div className="stat-value">{overview.totalHours}h</div>
                  <div className="stat-label">累计追踪时间</div>
                </div>
              </div>
            </div>
          )}

          {/* 小时编辑模态 */}
          {editHour !== null && (
            <Modal title={`记录 ${formatTime(editHour)}`} onClose={() => setEditHour(null)}>
              <p style={{ color: 'var(--text-secondary)', fontSize: '14px', marginBottom: '16px' }}>
                选择一个活动来记录这个小时：
              </p>
              <div className="activity-picker">
                {activities.map(act => (
                  <div key={act.id} className="activity-option" onClick={() => handleSaveEntry(act.id)}>
                    <span className="act-icon">{act.icon}</span>
                    <span className="act-name">{act.name}</span>
                  </div>
                ))}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  统计页面
    // ═══════════════════════════════════════════════════════════

    function StatsPage() {
      const [overview, setOverview] = useState(null);
      const [loading, setLoading] = useState(true);
      const [chartType, setChartType] = useState('category');
      const categoryChartRef = useRef(null);
      const categoryChartInstance = useRef(null);

      useEffect(() => {
        api.getOverview().then(res => {
          setOverview(res.data);
          setLoading(false);
        }).catch(err => {
          showToast('加载统计失败', 'error');
          setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!overview || !categoryChartRef.current) return;

        if (categoryChartInstance.current) {
          categoryChartInstance.current.destroy();
        }

        const ctx = categoryChartRef.current.getContext('2d');
        const data = overview.categoryTime || [];

        categoryChartInstance.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.category),
            datasets: [{
              data: data.map(d => d.total_minutes),
              backgroundColor: [
                '#4A90D9', '#10B981', '#F59E0B', '#EC4899',
                '#8B5CF6', '#EF4444', '#6366F1', '#14B8A6',
              ],
              borderWidth: 0,
              hoverOffset: 8,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { color: '#a0a0b8', padding: 16, usePointStyle: true, pointStyleWidth: 10, font: { size: 12 } },
              },
              tooltip: {
                callbacks: {
                  label: (ctx) => {
                    const hours = Math.round(ctx.raw / 60 * 10) / 10;
                    return ` ${ctx.label}: ${hours}h (${ctx.raw}min)`;
                  },
                },
              },
            },
            cutout: '65%',
          },
        });

        return () => { if (categoryChartInstance.current) categoryChartInstance.current.destroy(); };
      }, [overview]);

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header">
            <h2>📊 数据统计</h2>
            <p>全局数据分析与洞察</p>
          </div>

          <div className="grid-4" style={{ marginBottom: '20px' }}>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(74,144,217,0.15)' }}>📅</div>
              <div className="stat-info">
                <div className="stat-value">{overview?.dayCount || 0}</div>
                <div className="stat-label">记录天数</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(16,185,129,0.15)' }}>⏰</div>
              <div className="stat-info">
                <div className="stat-value">{overview?.totalHours || 0}h</div>
                <div className="stat-label">总追踪时间</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(236,72,153,0.15)' }}>🎯</div>
              <div className="stat-info">
                <div className="stat-value">{overview?.goalOverview?.completionRate || 0}%</div>
                <div className="stat-label">目标完成率</div>
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-icon" style={{ background: 'rgba(245,158,11,0.15)' }}>🔥</div>
              <div className="stat-info">
                <div className="stat-value">{overview?.currentStreak || 0}天</div>
                <div className="stat-label">连续记录</div>
              </div>
            </div>
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="card-header">
                <div className="card-title">📊 时间分配</div>
              </div>
              <div className="chart-container">
                <canvas ref={categoryChartRef}></canvas>
              </div>
            </div>
            <div className="card">
              <div className="card-header">
                <div className="card-title">📋 分类明细</div>
              </div>
              {overview?.categoryTime?.map((cat, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 0', borderBottom: '1px solid var(--border-color)' }}>
                  <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: ['#4A90D9','#10B981','#F59E0B','#EC4899','#8B5CF6','#EF4444','#6366F1','#14B8A6'][i % 8] }}></div>
                  <span style={{ flex: 1, fontSize: '14px' }}>{cat.category}</span>
                  <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{Math.round(cat.total_minutes/60*10)/10}h</span>
                  <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>{cat.entries}条</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  活动管理页面
    // ═══════════════════════════════════════════════════════════

    function ActivitiesPage() {
      const [activities, setActivities] = useState([]);
      const [grouped, setGrouped] = useState({});
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [filterCategory, setFilterCategory] = useState('');
      const [showAdd, setShowAdd] = useState(false);
      const [newActivity, setNewActivity] = useState({ name: '', category: '其他', icon: '📌', color: '#6c757d', description: '' });

      const loadActivities = useCallback(async () => {
        try {
          const params = [];
          if (search) params.push(`search=${search}`);
          if (filterCategory) params.push(`category=${filterCategory}`);
          const res = await api.getActivities(params.join('&'));
          setActivities(res.data.activities);
          setGrouped(res.data.grouped);
        } catch (err) {
          showToast('加载活动失败', 'error');
        }
        setLoading(false);
      }, [search, filterCategory]);

      useEffect(() => { loadActivities(); }, [loadActivities]);

      const categories = Object.keys(grouped);

      const handleAdd = async () => {
        if (!newActivity.name) return showToast('请输入活动名称', 'error');
        try {
          await api.createActivity(newActivity);
          showToast('活动创建成功', 'success');
          setShowAdd(false);
          setNewActivity({ name: '', category: '其他', icon: '📌', color: '#6c757d', description: '' });
          loadActivities();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleToggleFav = async (id) => {
        try {
          await api.toggleFavorite(id);
          loadActivities();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleDelete = async (id, name) => {
        if (!confirm(`确定删除"${name}"？`)) return;
        try {
          await api.deleteActivity(id);
          showToast('已删除', 'success');
          loadActivities();
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <h2>📋 活动管理</h2>
              <p>管理你的活动类型库 · 共 {activities.length} 个活动</p>
            </div>
            <button className="btn btn-primary" onClick={() => setShowAdd(true)}>+ 新建活动</button>
          </div>

          <div style={{ display: 'flex', gap: '12px', marginBottom: '20px' }}>
            <input className="input" placeholder="🔍 搜索活动..." value={search} onChange={e => setSearch(e.target.value)} style={{ maxWidth: '300px' }} />
            <select className="input" value={filterCategory} onChange={e => setFilterCategory(e.target.value)} style={{ maxWidth: '160px' }}>
              <option value="">全部分类</option>
              {categories.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>

          {Object.entries(grouped).map(([category, acts]) => (
            <div key={category} className="card" style={{ marginBottom: '16px' }}>
              <div className="card-header">
                <div className="card-title">{category}</div>
                <div className="card-subtitle">{acts.length} 个活动</div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: '8px' }}>
                {acts.map(act => (
                  <div key={act.id} style={{
                    display: 'flex', alignItems: 'center', gap: '10px',
                    padding: '10px 12px', borderRadius: 'var(--radius-sm)',
                    background: 'rgba(255,255,255,0.03)', cursor: 'pointer',
                    transition: 'all 0.2s',
                  }}>
                    <span style={{ fontSize: '24px' }}>{act.icon}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: '14px', fontWeight: 500 }}>{act.name}</div>
                      <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{act.usage_count}次使用</div>
                    </div>
                    <span style={{ cursor: 'pointer', fontSize: '16px', opacity: act.is_favorite ? 1 : 0.3 }} onClick={() => handleToggleFav(act.id)}>
                      {act.is_favorite ? '⭐' : '☆'}
                    </span>
                    <span style={{ cursor: 'pointer', fontSize: '14px', color: 'var(--text-muted)' }} onClick={() => handleDelete(act.id, act.name)}>🗑️</span>
                  </div>
                ))}
              </div>
            </div>
          ))}

          {showAdd && (
            <Modal title="新建活动" onClose={() => setShowAdd(false)} footer={
              <>
                <button className="btn" onClick={() => setShowAdd(false)}>取消</button>
                <button className="btn btn-primary" onClick={handleAdd}>创建</button>
              </>
            }>
              <div className="form-group">
                <label className="form-label">活动名称 *</label>
                <input className="input" value={newActivity.name} onChange={e => setNewActivity({...newActivity, name: e.target.value})} placeholder="例如：阅读" />
              </div>
              <div className="form-group">
                <label className="form-label">分类</label>
                <select className="input" value={newActivity.category} onChange={e => setNewActivity({...newActivity, category: e.target.value})}>
                  {['工作','生活','健康','学习','社交','娱乐','休息','个人成长','其他'].map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div className="grid-2">
                <div className="form-group">
                  <label className="form-label">图标</label>
                  <input className="input" value={newActivity.icon} onChange={e => setNewActivity({...newActivity, icon: e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">颜色</label>
                  <input type="color" className="input" value={newActivity.color} onChange={e => setNewActivity({...newActivity, color: e.target.value})} style={{ height: '36px', padding: '4px' }} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">描述</label>
                <input className="input" value={newActivity.description} onChange={e => setNewActivity({...newActivity, description: e.target.value})} placeholder="可选" />
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  设置页面
    // ═══════════════════════════════════════════════════════════

    function SettingsPage() {
      const [settings, setSettings] = useState({});
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        api.getSettings().then(res => {
          setSettings(res.data);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const handleSave = async () => {
        try {
          await api.updateSettings(settings);
          showToast('设置已保存', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      const handleExport = async (format) => {
        try {
          const res = await api.exportData(format);
          if (format === 'json') {
            const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `yi-tian-export-${today()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出', 'success');
          }
        } catch (err) {
          showToast(err.message, 'error');
        }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header">
            <h2>⚙️ 设置</h2>
            <p>自定义你的「一天」</p>
          </div>

          <div className="grid-2">
            <div className="card">
              <div className="card-header"><div className="card-title">🎨 外观</div></div>
              <div className="form-group">
                <label className="form-label">主题</label>
                <select className="input" value={settings.theme || 'auto'} onChange={e => setSettings({...settings, theme: e.target.value})}>
                  <option value="auto">自动</option>
                  <option value="dark">深色</option>
                  <option value="light">浅色</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">时间格式</label>
                <select className="input" value={settings.time_format || '24h'} onChange={e => setSettings({...settings, time_format: e.target.value})}>
                  <option value="24h">24小时制</option>
                  <option value="12h">12小时制</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">一周起始日</label>
                <select className="input" value={settings.week_start || 'monday'} onChange={e => setSettings({...settings, week_start: e.target.value})}>
                  <option value="monday">周一</option>
                  <option value="sunday">周日</option>
                </select>
              </div>
            </div>

            <div className="card">
              <div className="card-header"><div className="card-title">📤 数据管理</div></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <button className="btn" onClick={() => handleExport('json')}>📄 导出 JSON</button>
                <button className="btn" onClick={() => handleExport('csv')}>📊 导出 CSV</button>
                <div style={{ padding: '12px', background: 'rgba(245,158,11,0.1)', borderRadius: 'var(--radius-sm)', fontSize: '13px', color: 'var(--accent-orange)' }}>
                  ⚠️ 数据存储在本地 SQLite 数据库中，重启服务器后数据保留。
                </div>
              </div>
            </div>
          </div>

          <div style={{ marginTop: '20px' }}>
            <button className="btn btn-primary" onClick={handleSave}>💾 保存设置</button>
          </div>

          <div className="card" style={{ marginTop: '20px' }}>
            <div className="card-header"><div className="card-title">ℹ️ 关于</div></div>
            <div style={{ fontSize: '14px', color: 'var(--text-secondary)', lineHeight: 1.8 }}>
              <p><strong>一天（Yi Tian）</strong> v1.0.0</p>
              <p>24小时生命画布 — 用一天的视角，看清一生的轮廓。</p>
              <p style={{ marginTop: '8px', color: 'var(--text-muted)', fontSize: '12px' }}>
                技术栈：React 18 · Express.js · SQLite · Chart.js
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  主应用
    // ═══════════════════════════════════════════════════════════

    function App() {
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const timeStr = currentTime.toLocaleTimeString('zh-CN', { hour12: false });
      const dateStr = currentTime.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

      const navItems = [
        { id: 'dashboard', icon: '📊', label: '仪表板' },
        { id: 'stats', icon: '📈', label: '数据统计' },
        { id: 'activities', icon: '📋', label: '活动管理' },
        { id: 'settings', icon: '⚙️', label: '设置' },
      ];

      const pageTitles = {
        dashboard: '📊 仪表板',
        stats: '📈 数据统计',
        activities: '📋 活动管理',
        settings: '⚙️ 设置',
      };

      return (
        <div className="app-layout">
          {/* 侧边栏 */}
          <nav className="sidebar">
            <div className="sidebar-header">
              <div className="sidebar-logo">
                <div className="logo-icon">🌅</div>
                <div className="logo-text">
                  <h2>一天</h2>
                  <p>Yi Tian · 24h Canvas</p>
                </div>
              </div>
            </div>

            <div className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">导航</div>
                {navItems.map(item => (
                  <div
                    key={item.id}
                    className={`nav-item ${currentPage === item.id ? 'active' : ''}`}
                    onClick={() => setCurrentPage(item.id)}
                  >
                    <span className="nav-icon">{item.icon}</span>
                    <span>{item.label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="sidebar-footer">
              <div className="sidebar-time">
                <div className="time-display">{timeStr}</div>
                <div className="date-display">{dateStr}</div>
              </div>
            </div>
          </nav>

          {/* 主内容 */}
          <main className="main-content">
            <header className="main-header">
              <h1>{pageTitles[currentPage]}</h1>
              <div className="header-actions">
                <span style={{ fontSize: '13px', color: 'var(--text-muted)' }}>
                  {new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' })}
                </span>
              </div>
            </header>

            <div className="page-content">
              {currentPage === 'dashboard' && <DashboardPage />}
              {currentPage === 'stats' && <StatsPage />}
              {currentPage === 'activities' && <ActivitiesPage />}
              {currentPage === 'settings' && <SettingsPage />}
            </div>
          </main>

          <ToastContainer />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  挂载
    // ═══════════════════════════════════════════════════════════

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
