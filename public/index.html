<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一天 · Yi Tian — 24小时生命画布</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" crossorigin="anonymous"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════
       一天 · Daybook Design System — 暖纸主题
       ═══════════════════════════════════════════════════════════ */

    :root {
      --bg-canvas:    #F5F0E8;
      --bg-paper:     #FAF7F2;
      --bg-card:      #FFFFFF;
      --bg-inset:     #EDE8DF;
      --ink-primary:  #1A1A1A;
      --ink-secondary:#5C5C5C;
      --ink-muted:    #9C9C9C;
      --ink-faint:    #D0CCC4;
      --accent:       #C65D3E;
      --accent-light: #C65D3E22;
      --cat-work:     #5B7B8A;
      --cat-life:     #7A9E7E;
      --cat-health:   #C65D3E;
      --cat-learn:    #8B6B8A;
      --cat-social:   #D4A84B;
      --cat-fun:      #C4873B;
      --cat-rest:     #9BB0C4;
      --cat-growth:   #6B8F71;
      --sage:         #7A9E7E;
      --ochre:        #D4A84B;
      --slate:        #5B7B8A;
      --plum:         #8B6B8A;
      --amber:        #C4873B;
      --border-soft:  #E8E3DA;
      --border-hard:  #D0CCC4;
      --shadow-paper: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lift:  0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-float: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font-body: 'DM Sans', 'PingFang SC', sans-serif;
      --font-display: 'Playfair Display', 'Noto Serif SC', serif;
      --font-mono: 'DM Mono', monospace;
      --nav-width: 64px;
      --nav-expanded: 200px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-canvas);
      color: var(--ink-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 3px; }

    /* ─── 动画 ─── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes checkStroke {
      from { stroke-dashoffset: 24; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes slideRight {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .anim-up { animation: fadeSlideUp 0.4s ease both; }
    .anim-up-1 { animation-delay: 0.05s; }
    .anim-up-2 { animation-delay: 0.1s; }
    .anim-up-3 { animation-delay: 0.15s; }
    .anim-up-4 { animation-delay: 0.2s; }
    .anim-up-5 { animation-delay: 0.25s; }
    .anim-up-6 { animation-delay: 0.3s; }

    /* ─── 布局 ─── */
    .app-layout { display: flex; min-height: 100vh; }

    /* ─── 侧边导航 ─── */
    .sidebar {
      width: var(--nav-width);
      background: var(--bg-card);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .sidebar:hover { width: var(--nav-expanded); }

    .sidebar-brand {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .brand-text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      color: var(--ink-primary);
    }
    .sidebar:hover .brand-text { opacity: 1; }

    .sidebar-nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      color: var(--ink-muted);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      position: relative;
    }
    .nav-item:hover {
      background: var(--bg-inset);
      color: var(--ink-primary);
    }
    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
    }
    .nav-item .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .nav-item .nav-label {
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sidebar:hover .nav-item .nav-label { opacity: 1; }

    .sidebar-clock {
      padding: 16px;
      text-align: center;
      border-top: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .clock-time {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 400;
      color: var(--ink-primary);
      letter-spacing: 1px;
    }
    .clock-date {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sidebar:hover .clock-date { opacity: 1; }

    /* ─── 主内容 ─── */
    .main-content {
      margin-left: var(--nav-width);
      flex: 1;
      min-height: 100vh;
      padding: 32px 40px;
      max-width: calc(100vw - var(--nav-width));
    }

    .page-header {
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 600;
      color: var(--ink-primary);
      line-height: 1.2;
    }
    .page-header .page-subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      margin-top: 4px;
    }
    .page-header-line {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin-top: 12px;
      border-radius: 1px;
    }

    /* ─── 卡片 ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-paper);
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow-lift); }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--ink-muted);
      margin-bottom: 16px;
    }

    /* ─── 网格 ─── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .grid-today { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

    @media (max-width: 1100px) {
      .grid-today, .grid-4 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px 16px; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* ─── 统计大数字 ─── */
    .stat-hero {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .stat-hero .stat-number {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      color: var(--ink-primary);
    }
    .stat-hero .stat-unit {
      font-size: 14px;
      color: var(--ink-muted);
      font-weight: 500;
    }
    .stat-desc {
      font-size: 13px;
      color: var(--ink-muted);
    }

    /* ─── 小统计卡 ─── */
    .stat-mini {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-mini-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .stat-mini-value {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-mini-label {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    /* ─── 热力条 ─── */
    .heatmap-bar {
      display: flex;
      height: 48px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      gap: 2px;
      cursor: pointer;
    }
    .heatmap-cell {
      flex: 1;
      border-radius: 4px;
      transition: all 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .heatmap-cell:hover {
      transform: scaleY(1.15);
      z-index: 2;
      box-shadow: var(--shadow-lift);
    }
    .heatmap-cell.empty {
      background: var(--bg-inset);
      border: 1px dashed var(--border-hard);
    }
    .heatmap-cell.empty:hover {
      background: var(--border-soft);
    }
    .heatmap-cell .cell-icon { font-size: 16px; line-height: 1; }
    .heatmap-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 2px;
    }
    .heatmap-labels span {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-muted);
    }

    /* ─── 时间轴列表 ─── */
    .tl-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
      cursor: pointer;
      border-bottom: 1px solid transparent;
    }
    .tl-row:hover { background: var(--bg-inset); }
    .tl-row + .tl-row { border-top: 1px solid var(--border-soft); }
    .tl-time {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink-muted);
      width: 44px;
      flex-shrink: 0;
    }
    .tl-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .tl-info { flex: 1; min-width: 0; }
    .tl-name { font-size: 14px; font-weight: 500; }
    .tl-note {
      font-size: 12px;
      color: var(--ink-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tl-empty {
      font-size: 13px;
      color: var(--ink-faint);
      font-style: italic;
    }
    .tl-intensity {
      display: flex;
      gap: 3px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--ink-faint);
    }
    .dot.filled { background: var(--accent); }

    /* ─── 目标 ─── */
    .goal-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
    }
    .goal-item + .goal-item { border-top: 1px solid var(--border-soft); }
    .goal-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border-hard);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .goal-check.done {
      background: var(--sage);
      border-color: var(--sage);
    }
    .goal-info { flex: 1; }
    .goal-title { font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .goal-title.done {
      text-decoration: line-through;
      color: var(--ink-muted);
    }
    .goal-progress {
      height: 4px;
      background: var(--bg-inset);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .goal-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .goal-meta {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    /* ─── 习惯 ─── */
    .habit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }
    .habit-row + .habit-row { border-top: 1px solid var(--border-soft); }
    .habit-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border-hard);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 12px;
    }
    .habit-dot.done {
      background: var(--sage);
      border-color: var(--sage);
      color: white;
    }
    .habit-icon { font-size: 18px; flex-shrink: 0; }
    .habit-name { flex: 1; font-size: 14px; font-weight: 500; }
    .habit-streak {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── 按钮 ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border-hard);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--ink-primary);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--bg-inset); box-shadow: var(--shadow-paper); }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-accent:hover { background: #b5523a; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-ghost { border: none; background: none; color: var(--ink-muted); }
    .btn-ghost:hover { color: var(--ink-primary); background: var(--bg-inset); }

    /* ─── 输入框 ─── */
    .input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-paper);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      color: var(--ink-primary);
      font-size: 14px;
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .input::placeholder { color: var(--ink-muted); }

    /* ─── 分割线 ─── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-soft), transparent);
      margin: 24px 0;
    }

    /* ─── 进度条 ─── */
    .progress-bar {
      height: 6px;
      background: var(--bg-inset);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* ─── 活动选择器 ─── */
    .act-picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }
    .act-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 6px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
      text-align: center;
    }
    .act-opt:hover {
      background: var(--bg-inset);
      transform: translateY(-1px);
    }
    .act-opt .act-ico { font-size: 28px; }
    .act-opt .act-nm {
      font-size: 11px;
      color: var(--ink-secondary);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── 模态 ─── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-float);
      animation: scaleIn 0.2s ease;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-head h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
    }
    .modal-close {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--ink-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover { background: var(--bg-inset); color: var(--ink-primary); }
    .modal-body { margin-bottom: 20px; }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-muted); margin-bottom: 6px; }

    /* ─── Toast ─── */
    .toast-box { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      box-shadow: var(--shadow-float);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeSlideUp 0.3s ease;
    }
    .toast.success { border-left: 3px solid var(--sage); }
    .toast.error { border-left: 3px solid var(--accent); }
    .toast.info { border-left: 3px solid var(--slate); }

    /* ─── 搜索弹窗 ─── */
    .search-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      z-index: 250;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20vh;
      animation: fadeIn 0.15s;
    }
    .search-box {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-float);
      width: 480px;
      max-width: 90%;
      overflow: hidden;
      animation: scaleIn 0.2s;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      background: none;
      font-size: 16px;
      font-family: var(--font-body);
      color: var(--ink-primary);
      outline: none;
    }
    .search-input::placeholder { color: var(--ink-muted); }
    .search-results {
      border-top: 1px solid var(--border-soft);
      max-height: 300px;
      overflow-y: auto;
    }
    .search-item {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 14px;
    }
    .search-item:hover { background: var(--bg-inset); }
    .search-item .sr-icon { font-size: 16px; }

    /* ─── 加载 ─── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-soft);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 空状态 ─── */
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--ink-muted);
    }
    .empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }
    .empty-text { font-size: 13px; }

    /* ─── 分类色条 ─── */
    .cat-bar {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      gap: 2px;
    }
    .cat-seg {
      transition: width 0.5s ease;
      min-width: 3px;
      border-radius: 5px;
    }
    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ─── 周打卡矩阵 ─── */
    .week-grid {
      display: grid;
      grid-template-columns: 1fr repeat(7, 32px) 60px;
      gap: 8px 4px;
      align-items: center;
    }
    .week-header {
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
      font-weight: 600;
    }
    .week-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 10px;
    }
    .week-dot.done {
      background: var(--sage);
      border-color: var(--sage);
      color: white;
    }
    .week-dot.today { border-color: var(--accent); }
    .week-name { font-size: 13px; font-weight: 500; }
    .week-streak {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--amber);
      text-align: right;
    }

    /* ─── 图表容器 ─── */
    .chart-wrap {
      position: relative;
      height: 220px;
    }

    /* ─── 响应式 ─── */
    @media (max-width: 768px) {
      .page-header h1 { font-size: 28px; }
      .stat-hero .stat-number { font-size: 36px; }
      .heatmap-bar { height: 36px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    /* ═══════════════════════════════════════════════
       API Service
       ═══════════════════════════════════════════════ */

    const api = {
      async req(path, opts = {}) {
        const cfg = { headers: { 'Content-Type': 'application/json' }, ...opts };
        if (cfg.body && typeof cfg.body === 'object') cfg.body = JSON.stringify(cfg.body);
        const r = await fetch(`/api${path}`, cfg);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error?.message || '请求失败');
        return d;
      },
      getActivities: (q='') => api.req(`/activities${q?'?'+q:''}`),
      createActivity: (d) => api.req('/activities', { method:'POST', body:d }),
      toggleFav: (id) => api.req(`/activities/${id}/favorite`, { method:'PATCH' }),
      deleteActivity: (id) => api.req(`/activities/${id}?force=true`, { method:'DELETE' }),
      getTimeline: (date) => api.req(`/timeline/${date}`),
      saveEntry: (d) => api.req('/timeline', { method:'POST', body:d }),
      deleteEntry: (date, h) => api.req(`/timeline/${date}/${h}`, { method:'DELETE' }),
      getGoals: (date) => api.req(`/goals/${date}`),
      createGoal: (d) => api.req('/goals', { method:'POST', body:d }),
      toggleGoal: (id) => api.req(`/goals/${id}/complete`, { method:'PATCH' }),
      getMoods: (date) => api.req(`/moods/${date}`),
      saveMood: (d) => api.req('/moods', { method:'POST', body:d }),
      getHabits: () => api.req('/habits'),
      createHabit: (d) => api.req('/habits', { method:'POST', body:d }),
      logHabit: (id, d={}) => api.req(`/habits/${id}/log`, { method:'POST', body:d }),
      getOverview: () => api.req('/stats/overview'),
      getSettings: () => api.req('/settings'),
      updateSettings: (d) => api.req('/settings', { method:'PUT', body:d }),
    };

    /* ═══════════════════════════════════════════════
       Utils
       ═══════════════════════════════════════════════ */

    const fmtDate = (d) => new Date(d).toISOString().split('T')[0];
    const today = () => fmtDate(new Date());
    const fmtHour = (h) => `${String(h).padStart(2,'0')}:00`;

    const CAT_COLORS = {
      '工作':'#5B7B8A','生活':'#7A9E7E','健康':'#C65D3E','学习':'#8B6B8A',
      '社交':'#D4A84B','娱乐':'#C4873B','休息':'#9BB0C4','个人成长':'#6B8F71','其他':'#9C9C9C',
    };

    const MOOD_EMOJIS = ['','😢','😞','😕','😐','🙂','😊','😄','😁','🤩','🥳'];

    let _toastId = 0;
    const _toastLis = new Set();
    function toast(msg, type='info') {
      const t = { id: ++_toastId, msg, type };
      _toastLis.forEach(fn => fn(t));
    }

    /* ═══════════════════════════════════════════════
       Toast Container
       ═══════════════════════════════════════════════ */

    function ToastBox() {
      const [list, setList] = useState([]);
      useEffect(() => {
        const fn = (t) => {
          setList(p => [...p, t]);
          setTimeout(() => setList(p => p.filter(x => x.id !== t.id)), 3000);
        };
        _toastLis.add(fn);
        return () => _toastLis.delete(fn);
      }, []);
      return (
        <div className="toast-box">
          {list.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Modal
       ═══════════════════════════════════════════════ */

    function Modal({ title, onClose, children, footer }) {
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-head">
              <h3>{title}</h3>
              <button className="modal-close" onClick={onClose}>×</button>
            </div>
            <div className="modal-body">{children}</div>
            {footer && <div className="modal-foot">{footer}</div>}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Search Overlay (Cmd+K)
       ═══════════════════════════════════════════════ */

    function SearchOverlay({ activities, onClose, onNavigate }) {
      const [q, setQ] = useState('');
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current?.focus(); }, []);

      const results = useMemo(() => {
        if (!q.trim()) return [];
        const s = q.toLowerCase();
        const matches = [];
        // Activities
        activities.filter(a => a.name.toLowerCase().includes(s) || (a.name_en||'').toLowerCase().includes(s))
          .slice(0, 5)
          .forEach(a => matches.push({ type: 'activity', icon: a.icon, label: a.name, sub: a.category }));
        // Pages
        const pages = [
          { icon: '📊', label: '仪表板', page: 'today' },
          { icon: '⏰', label: '时间轴', page: 'timeline' },
          { icon: '📈', label: '洞察分析', page: 'insights' },
          { icon: '📋', label: '活动管理', page: 'activities' },
          { icon: '✅', label: '习惯追踪', page: 'habits' },
          { icon: '⚙️', label: '设置', page: 'settings' },
        ];
        pages.filter(p => p.label.includes(s)).forEach(p => matches.push({ type: 'page', ...p }));
        return matches;
      }, [q, activities]);

      return (
        <div className="search-overlay" onClick={onClose}>
          <div className="search-box" onClick={e => e.stopPropagation()}>
            <input
              ref={inputRef}
              className="search-input"
              placeholder="搜索活动、页面..."
              value={q}
              onChange={e => setQ(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Escape') onClose();
                if (e.key === 'Enter' && results.length > 0 && results[0].page) {
                  onNavigate(results[0].page);
                  onClose();
                }
              }}
            />
            {results.length > 0 && (
              <div className="search-results">
                {results.map((r, i) => (
                  <div key={i} className="search-item" onClick={() => {
                    if (r.page) { onNavigate(r.page); onClose(); }
                  }}>
                    <span className="sr-icon">{r.icon}</span>
                    <span>{r.label}</span>
                    {r.sub && <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--ink-muted)' }}>{r.sub}</span>}
                  </div>
                ))}
              </div>
            )}
            {q && results.length === 0 && (
              <div style={{ padding: '20px', textAlign: 'center', color: 'var(--ink-muted)', fontSize: 13 }}>
                没有找到匹配结果
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Today Page
       ═══════════════════════════════════════════════ */

    function TodayPage() {
      const [date, setDate] = useState(today());
      const [tl, setTl] = useState([]);
      const [stats, setStats] = useState(null);
      const [goals, setGoals] = useState({ goals:[], completed:0, total:0, completionRate:0 });
      const [moods, setMoods] = useState({ moods:[], averages:null });
      const [habits, setHabits] = useState([]);
      const [overview, setOverview] = useState(null);
      const [activities, setActivities] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editHour, setEditHour] = useState(null);
      const moodChartRef = useRef(null);
      const moodChartInst = useRef(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [t, g, m, ov, h, a] = await Promise.all([
            api.getTimeline(date), api.getGoals(date), api.getMoods(date),
            api.getOverview(), api.getHabits(), api.getActivities(),
          ]);
          setTl(t.data.timeline); setStats(t.data.stats);
          setGoals(g.data); setMoods(m.data);
          setOverview(ov.data); setHabits(h.data);
          setActivities(a.data.activities);
        } catch(e) { toast('加载失败: ' + e.message, 'error'); }
        setLoading(false);
      }, [date]);

      useEffect(() => { load(); }, [load]);

      // Mood chart
      useEffect(() => {
        if (!moodChartRef.current || moods.moods.length === 0) return;
        if (moodChartInst.current) moodChartInst.current.destroy();
        const ctx = moodChartRef.current.getContext('2d');
        const data = moods.moods.sort((a,b) => a.hour - b.hour);
        moodChartInst.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.map(d => fmtHour(d.hour)),
            datasets: [
              { label: '心情', data: data.map(d => d.mood_score), borderColor: '#C4873B', backgroundColor: 'rgba(196,135,59,0.08)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#C4873B', borderWidth: 2 },
              { label: '精力', data: data.map(d => d.energy_level), borderColor: '#5B7B8A', backgroundColor: 'rgba(91,123,138,0.06)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#5B7B8A', borderWidth: 2 },
            ],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans', size: 12 }, usePointStyle: true, padding: 16 } } },
            scales: {
              y: { min: 0, max: 10, ticks: { stepSize: 2, font: { family: 'DM Mono', size: 11 }, color: '#9C9C9C' }, grid: { color: '#E8E3DA' }, border: { display: false } },
              x: { ticks: { font: { family: 'DM Mono', size: 11 }, color: '#9C9C9C' }, grid: { display: false }, border: { display: false } },
            },
          },
        });
        return () => { if (moodChartInst.current) moodChartInst.current.destroy(); };
      }, [moods]);

      const currentHour = new Date().getHours();
      const categoryTime = stats?.categoryTime || [];
      const totalMin = stats?.totalMinutes || 0;

      const handleSaveEntry = async (actId) => {
        try {
          await api.saveEntry({ date, hour: editHour, activity_id: actId, duration_min: 60, intensity: 3 });
          toast(`${fmtHour(editHour)} 已记录`, 'success');
          setEditHour(null); load();
        } catch(e) { toast(e.message, 'error'); }
      };

      const handleToggleGoal = async (id) => { try { await api.toggleGoal(id); load(); } catch(e) { toast(e.message, 'error'); } };
      const handleToggleHabit = async (id) => {
        try { await api.logHabit(id, { date }); toast('已打卡', 'success'); load(); }
        catch(e) { toast(e.message.includes('已存在') ? '今天已打卡' : e.message, 'info'); }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up">
            <h1>今天，{new Date().toLocaleDateString('zh-CN', { weekday: 'long', month: 'long', day: 'numeric' })}</h1>
            <div className="page-header-line"></div>
          </div>

          {/* Hero Stats */}
          <div className="grid-4 anim-up anim-up-1" style={{ marginBottom: 24 }}>
            <div className="card">
              <div className="stat-hero">
                <span className="stat-number">{stats?.totalHours || 0}</span>
                <span className="stat-unit">小时已记录</span>
              </div>
              <div className="stat-desc">{stats?.filledHours || 0}/24 小时 · {stats?.emptyHours || 24} 小时空闲</div>
            </div>
            <div className="card">
              <div className="stat-hero">
                <span className="stat-number">{goals.completionRate}</span>
                <span className="stat-unit">% 目标完成</span>
              </div>
              <div className="stat-desc">{goals.completed}/{goals.total} 个目标</div>
            </div>
            <div className="card">
              <div className="stat-hero">
                <span className="stat-number">{moods.averages?.mood_score || '—'}</span>
                <span className="stat-unit">平均心情</span>
              </div>
              <div className="stat-desc">{moods.averages ? MOOD_EMOJIS[Math.round(moods.averages.mood_score)] : ''} {moods.count || 0} 条记录</div>
            </div>
            <div className="card">
              <div className="stat-hero">
                <span className="stat-number">{overview?.currentStreak || 0}</span>
                <span className="stat-unit">天连续</span>
              </div>
              <div className="stat-desc">保持记录的习惯</div>
            </div>
          </div>

          {/* Heatmap Bar */}
          <div className="card anim-up anim-up-2" style={{ marginBottom: 24 }}>
            <div className="card-title">24 小时 · 时间热力条</div>
            <div className="heatmap-bar">
              {tl.map(({ hour, entry, isEmpty }) => (
                <div
                  key={hour}
                  className={`heatmap-cell ${isEmpty ? 'empty' : ''}`}
                  style={entry ? { background: entry.activity_color + 'CC' } : {}}
                  onClick={() => setEditHour(hour)}
                  title={entry ? `${fmtHour(hour)} · ${entry.activity_name}${entry.note ? '\n' + entry.note : ''}` : `${fmtHour(hour)} · 空闲`}
                >
                  {!isEmpty && <span className="cell-icon">{entry.activity_icon}</span>}
                </div>
              ))}
            </div>
            <div className="heatmap-labels">
              <span>00</span><span>06</span><span>12</span><span>18</span><span>23</span>
            </div>
            {totalMin > 0 && (
              <div style={{ marginTop: 16 }}>
                <div className="cat-bar">
                  {categoryTime.map((c, i) => (
                    <div key={i} className="cat-seg" style={{ width: `${c.total_minutes/totalMin*100}%`, background: CAT_COLORS[c.category] || '#9C9C9C' }} />
                  ))}
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 10 }}>
                  {categoryTime.map((c, i) => (
                    <span key={i} className="cat-tag" style={{ background: (CAT_COLORS[c.category]||'#9C9C9C') + '18', color: CAT_COLORS[c.category] || '#9C9C9C' }}>
                      {c.category} {Math.round(c.total_minutes/60*10)/10}h
                    </span>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Timeline + Sidebar */}
          <div className="grid-today anim-up anim-up-3">
            {/* Vertical Timeline */}
            <div className="card">
              <div className="card-title">时间轴明细</div>
              <div>
                {tl.filter(t => !t.isEmpty).length === 0 ? (
                  <div className="empty"><div className="empty-icon">📝</div><div className="empty-text">今天还没有记录，点击热力条开始</div></div>
                ) : (
                  tl.filter(t => !t.isEmpty).map(({ hour, entry }) => (
                    <div key={hour} className="tl-row">
                      <span className="tl-time">{fmtHour(hour)}</span>
                      <div className="tl-icon" style={{ background: entry.activity_color + '22' }}>{entry.activity_icon}</div>
                      <div className="tl-info">
                        <div className="tl-name">{entry.activity_name}</div>
                        {entry.note && <div className="tl-note">{entry.note}</div>}
                      </div>
                      <div className="tl-intensity">
                        {[1,2,3,4,5].map(i => <div key={i} className={`dot ${i <= entry.intensity ? 'filled' : ''}`} />)}
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>

            {/* Right sidebar: Goals + Habits */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div className="card">
                <div className="card-title">今日目标</div>
                {goals.goals.length === 0 ? (
                  <div className="empty"><div className="empty-text">还没有设置目标</div></div>
                ) : goals.goals.map(g => (
                  <div key={g.id} className="goal-item">
                    <div className={`goal-check ${g.is_completed ? 'done' : ''}`} onClick={() => handleToggleGoal(g.id)}>
                      {g.is_completed && <span style={{ color:'white', fontSize:10 }}>✓</span>}
                    </div>
                    <div className="goal-info">
                      <div className={`goal-title ${g.is_completed ? 'done' : ''}`}>{g.title}</div>
                      {g.target_value && (
                        <div>
                          <div className="goal-progress">
                            <div className="goal-progress-fill" style={{ width: `${Math.min(100, g.current_value/g.target_value*100)}%`, background: CAT_COLORS[g.category] || 'var(--accent)' }} />
                          </div>
                          <div className="goal-meta">{Math.round(g.current_value)}/{g.target_value} {g.unit}</div>
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>

              <div className="card">
                <div className="card-title">习惯打卡</div>
                {habits.length === 0 ? (
                  <div className="empty"><div className="empty-text">还没有习惯</div></div>
                ) : habits.map(h => (
                  <div key={h.id} className="habit-row">
                    <div className={`habit-dot ${h.isCompletedToday ? 'done' : ''}`} onClick={() => handleToggleHabit(h.id)}>
                      {h.isCompletedToday ? '✓' : ''}
                    </div>
                    <span className="habit-icon">{h.icon}</span>
                    <span className="habit-name">{h.name}</span>
                    {h.streak > 0 && <span className="habit-streak">🔥 {h.streak}</span>}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Mood Chart */}
          {moods.moods.length > 0 && (
            <div className="card anim-up anim-up-4" style={{ marginTop: 24 }}>
              <div className="card-title">心情与精力曲线</div>
              <div className="chart-wrap"><canvas ref={moodChartRef}></canvas></div>
            </div>
          )}

          {/* Edit Hour Modal */}
          {editHour !== null && (
            <Modal title={`记录 ${fmtHour(editHour)}`} onClose={() => setEditHour(null)}>
              <p style={{ color: 'var(--ink-secondary)', fontSize: 14, marginBottom: 16 }}>选择这个小时做了什么：</p>
              <div className="act-picker">
                {activities.map(a => (
                  <div key={a.id} className="act-opt" onClick={() => handleSaveEntry(a.id)}>
                    <span className="act-ico">{a.icon}</span>
                    <span className="act-nm">{a.name}</span>
                  </div>
                ))}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Timeline Page
       ═══════════════════════════════════════════════ */

    function TimelinePage() {
      const [date, setDate] = useState(today());
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activities, setActivities] = useState([]);
      const [editHour, setEditHour] = useState(null);

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [t, a] = await Promise.all([api.getTimeline(date), api.getActivities()]);
          setData(t.data); setActivities(a.data.activities);
        } catch(e) { toast(e.message, 'error'); }
        setLoading(false);
      }, [date]);

      useEffect(() => { load(); }, [load]);

      const handleSave = async (actId) => {
        try {
          await api.saveEntry({ date, hour: editHour, activity_id: actId, duration_min: 60, intensity: 3 });
          toast('已记录', 'success'); setEditHour(null); load();
        } catch(e) { toast(e.message, 'error'); }
      };

      const handleDelete = async (hour) => {
        try { await api.deleteEntry(date, hour); toast('已删除', 'success'); load(); }
        catch(e) { toast(e.message, 'error'); }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up">
            <h1>时间轴</h1>
            <div className="page-header-line"></div>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }} className="anim-up anim-up-1">
            <button className="btn btn-sm" onClick={() => setDate(fmtDate(new Date(new Date(date).getTime() - 86400000)))}>◀</button>
            <input type="date" className="input" style={{ width: 160 }} value={date} onChange={e => setDate(e.target.value)} />
            <button className="btn btn-sm" onClick={() => setDate(fmtDate(new Date(new Date(date).getTime() + 86400000)))}>▶</button>
            <button className="btn btn-sm" onClick={() => setDate(today())}>今天</button>
          </div>

          <div className="card anim-up anim-up-2">
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              {data?.timeline.map(({ hour, entry, isEmpty }) => (
                <div key={hour} className="tl-row" onClick={() => isEmpty ? setEditHour(hour) : null}>
                  <span className="tl-time">{fmtHour(hour)}</span>
                  {isEmpty ? (
                    <span className="tl-empty" style={{ flex: 1 }}>— 空闲 — 点击记录</span>
                  ) : (
                    <>
                      <div className="tl-icon" style={{ background: entry.activity_color + '22' }}>{entry.activity_icon}</div>
                      <div className="tl-info">
                        <div className="tl-name">{entry.activity_name}</div>
                        {entry.note && <div className="tl-note">{entry.note}</div>}
                      </div>
                      <div className="tl-intensity">
                        {[1,2,3,4,5].map(i => <div key={i} className={`dot ${i <= entry.intensity ? 'filled' : ''}`} />)}
                      </div>
                      <button className="btn btn-ghost btn-sm" onClick={(e) => { e.stopPropagation(); handleDelete(hour); }}>✕</button>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>

          {editHour !== null && (
            <Modal title={`记录 ${fmtHour(editHour)}`} onClose={() => setEditHour(null)}>
              <div className="act-picker">
                {activities.map(a => (
                  <div key={a.id} className="act-opt" onClick={() => handleSave(a.id)}>
                    <span className="act-ico">{a.icon}</span>
                    <span className="act-nm">{a.name}</span>
                  </div>
                ))}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Insights Page
       ═══════════════════════════════════════════════ */

    function InsightsPage() {
      const [overview, setOverview] = useState(null);
      const [loading, setLoading] = useState(true);
      const chartRef = useRef(null);
      const chartInst = useRef(null);

      useEffect(() => {
        api.getOverview().then(r => { setOverview(r.data); setLoading(false); }).catch(() => setLoading(false));
      }, []);

      useEffect(() => {
        if (!overview || !chartRef.current) return;
        if (chartInst.current) chartInst.current.destroy();
        const data = overview.categoryTime || [];
        chartInst.current = new Chart(chartRef.current.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.category),
            datasets: [{ data: data.map(d => d.total_minutes), backgroundColor: data.map(d => CAT_COLORS[d.category] || '#9C9C9C'), borderWidth: 0, hoverOffset: 8 }],
          },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '65%',
            plugins: {
              legend: { position: 'bottom', labels: { font: { family: 'DM Sans', size: 12 }, usePointStyle: true, padding: 16, color: '#5C5C5C' } },
              tooltip: { callbacks: { label: (c) => ` ${c.label}: ${Math.round(c.raw/60*10)/10}h` } },
            },
          },
        });
        return () => { if (chartInst.current) chartInst.current.destroy(); };
      }, [overview]);

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up">
            <h1>洞察</h1>
            <div className="page-header-line"></div>
          </div>

          <div className="grid-4 anim-up anim-up-1" style={{ marginBottom: 24 }}>
            <div className="card"><div className="stat-mini"><div className="stat-mini-icon" style={{background:'var(--accent-light)'}}>📅</div><div><div className="stat-mini-value">{overview?.dayCount||0}</div><div className="stat-mini-label">记录天数</div></div></div></div>
            <div className="card"><div className="stat-mini"><div className="stat-mini-icon" style={{background:'rgba(122,158,126,0.15)'}}>⏰</div><div><div className="stat-mini-value">{overview?.totalHours||0}h</div><div className="stat-mini-label">总追踪时间</div></div></div></div>
            <div className="card"><div className="stat-mini"><div className="stat-mini-icon" style={{background:'rgba(212,168,75,0.15)'}}>🎯</div><div><div className="stat-mini-value">{overview?.goalOverview?.completionRate||0}%</div><div className="stat-mini-label">目标完成率</div></div></div></div>
            <div className="card"><div className="stat-mini"><div className="stat-mini-icon" style={{background:'rgba(196,135,59,0.15)'}}>🔥</div><div><div className="stat-mini-value">{overview?.currentStreak||0}天</div><div className="stat-mini-label">连续记录</div></div></div></div>
          </div>

          <div className="grid-2 anim-up anim-up-2">
            <div className="card">
              <div className="card-title">时间分配</div>
              <div className="chart-wrap"><canvas ref={chartRef}></canvas></div>
            </div>
            <div className="card">
              <div className="card-title">分类明细</div>
              {overview?.categoryTime?.map((c, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', borderBottom: '1px solid var(--border-soft)' }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: CAT_COLORS[c.category] || '#9C9C9C', flexShrink: 0 }}></div>
                  <span style={{ flex: 1, fontSize: 14 }}>{c.category}</span>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--ink-secondary)' }}>{Math.round(c.total_minutes/60*10)/10}h</span>
                  <span style={{ fontSize: 12, color: 'var(--ink-muted)', width: 50, textAlign: 'right' }}>{c.entries}条</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Activities Page
       ═══════════════════════════════════════════════ */

    function ActivitiesPage() {
      const [grouped, setGrouped] = useState({});
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [showAdd, setShowAdd] = useState(false);
      const [form, setForm] = useState({ name:'', category:'其他', icon:'📌', color:'#9C9C9C', description:'' });

      const load = useCallback(async () => {
        try {
          const q = search ? `search=${search}` : '';
          const r = await api.getActivities(q);
          setGrouped(r.data.grouped);
        } catch(e) { toast(e.message, 'error'); }
        setLoading(false);
      }, [search]);

      useEffect(() => { load(); }, [load]);

      const handleAdd = async () => {
        if (!form.name) return toast('请输入名称', 'error');
        try { await api.createActivity(form); toast('已创建', 'success'); setShowAdd(false); setForm({ name:'', category:'其他', icon:'📌', color:'#9C9C9C', description:'' }); load(); }
        catch(e) { toast(e.message, 'error'); }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up" style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <div><h1>活动库</h1><div className="page-header-line"></div></div>
            <button className="btn btn-accent" onClick={() => setShowAdd(true)}>+ 新建</button>
          </div>

          <div className="anim-up anim-up-1" style={{ marginBottom: 20 }}>
            <input className="input" placeholder="搜索活动..." value={search} onChange={e => setSearch(e.target.value)} style={{ maxWidth: 320 }} />
          </div>

          {Object.entries(grouped).map(([cat, acts]) => (
            <div key={cat} className="card anim-up anim-up-2" style={{ marginBottom: 16 }}>
              <div className="card-title" style={{ color: CAT_COLORS[cat] }}>{cat} · {acts.length}</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 8 }}>
                {acts.map(a => (
                  <div key={a.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:'var(--radius-sm)', background:'var(--bg-paper)', cursor:'pointer', transition:'all 0.15s' }}
                    onMouseOver={e => e.currentTarget.style.background='var(--bg-inset)'}
                    onMouseOut={e => e.currentTarget.style.background='var(--bg-paper)'}
                  >
                    <span style={{ fontSize:22 }}>{a.icon}</span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:500 }}>{a.name}</div>
                      <div style={{ fontSize:11, color:'var(--ink-muted)' }}>{a.usage_count}次</div>
                    </div>
                    <span style={{ cursor:'pointer', opacity: a.is_favorite?1:0.3 }} onClick={() => api.toggleFav(a.id).then(load)}>{a.is_favorite?'⭐':'☆'}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}

          {showAdd && (
            <Modal title="新建活动" onClose={() => setShowAdd(false)} footer={<><button className="btn" onClick={() => setShowAdd(false)}>取消</button><button className="btn btn-accent" onClick={handleAdd}>创建</button></>}>
              <div className="form-group"><label className="form-label">名称 *</label><input className="input" value={form.name} onChange={e => setForm({...form, name: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">分类</label><select className="input" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>{['工作','生活','健康','学习','社交','娱乐','休息','个人成长','其他'].map(c => <option key={c}>{c}</option>)}</select></div>
              <div className="grid-2">
                <div className="form-group"><label className="form-label">图标</label><input className="input" value={form.icon} onChange={e => setForm({...form, icon: e.target.value})} /></div>
                <div className="form-group"><label className="form-label">颜色</label><input type="color" className="input" value={form.color} onChange={e => setForm({...form, color: e.target.value})} style={{ height:38, padding:4 }} /></div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Habits Page
       ═══════════════════════════════════════════════ */

    function HabitsPage() {
      const [habits, setHabits] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => { api.getHabits().then(r => { setHabits(r.data); setLoading(false); }).catch(() => setLoading(false)); }, []);

      const todayDate = today();
      const dayNames = ['日','一','二','三','四','五','六'];
      const getWeekDates = () => {
        const d = new Date();
        const day = d.getDay();
        const monday = new Date(d);
        monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
        return Array.from({length:7}, (_, i) => { const dd = new Date(monday); dd.setDate(monday.getDate()+i); return fmtDate(dd); });
      };
      const weekDates = getWeekDates();

      const handleToggle = async (id) => {
        try { await api.logHabit(id, { date: todayDate }); toast('已打卡', 'success'); const r = await api.getHabits(); setHabits(r.data); }
        catch(e) { toast(e.message.includes('已存在') ? '今天已打卡' : e.message, 'info'); }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up">
            <h1>习惯</h1>
            <div className="page-header-line"></div>
          </div>

          <div className="card anim-up anim-up-1">
            <div className="week-grid">
              <div></div>
              {weekDates.map((d, i) => {
                const dd = new Date(d);
                return <div key={i} className="week-header">{dayNames[dd.getDay()]}<br/><span style={{fontSize:10,fontWeight:400}}>{dd.getDate()}</span></div>;
              })}
              <div className="week-header">streak</div>

              {habits.map(h => (
                <React.Fragment key={h.id}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ fontSize:16 }}>{h.icon}</span>
                    <span className="week-name">{h.name}</span>
                  </div>
                  {weekDates.map((d, i) => {
                    const log = h.logs?.find(l => l.date === d);
                    const isToday = d === todayDate;
                    return (
                      <div key={i} className={`week-dot ${log ? 'done' : ''} ${isToday ? 'today' : ''}`}
                        onClick={() => isToday && handleToggle(h.id)}
                        title={d}
                      >
                        {log ? '✓' : ''}
                      </div>
                    );
                  })}
                  <div className="week-streak">
                    {h.streak > 0 ? `${h.streak}天` : '—'}
                    {h.streak >= 7 && ' 🔥'}
                  </div>
                </React.Fragment>
              ))}
            </div>

            {habits.length === 0 && <div className="empty"><div className="empty-icon">✅</div><div className="empty-text">还没有创建习惯</div></div>}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Settings Page
       ═══════════════════════════════════════════════ */

    function SettingsPage() {
      const [settings, setSettings] = useState({});
      const [loading, setLoading] = useState(true);

      useEffect(() => { api.getSettings().then(r => { setSettings(r.data); setLoading(false); }).catch(() => setLoading(false)); }, []);

      const handleSave = async () => { try { await api.updateSettings(settings); toast('已保存', 'success'); } catch(e) { toast(e.message, 'error'); } };
      const handleExport = async () => {
        try {
          const r = await api.req('/stats/export?format=json');
          const blob = new Blob([JSON.stringify(r.data, null, 2)], { type:'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `yi-tian-${today()}.json`; a.click();
          URL.revokeObjectURL(url); toast('已导出', 'success');
        } catch(e) { toast(e.message, 'error'); }
      };

      if (loading) return <div className="loading"><div className="spinner"></div></div>;

      return (
        <div>
          <div className="page-header anim-up">
            <h1>设置</h1>
            <div className="page-header-line"></div>
          </div>

          <div className="grid-2 anim-up anim-up-1">
            <div className="card">
              <div className="card-title">偏好</div>
              <div className="form-group"><label className="form-label">时间格式</label><select className="input" value={settings.time_format||'24h'} onChange={e => setSettings({...settings, time_format: e.target.value})}><option value="24h">24小时制</option><option value="12h">12小时制</option></select></div>
              <div className="form-group"><label className="form-label">一周起始</label><select className="input" value={settings.week_start||'monday'} onChange={e => setSettings({...settings, week_start: e.target.value})}><option value="monday">周一</option><option value="sunday">周日</option></select></div>
            </div>
            <div className="card">
              <div className="card-title">数据</div>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                <button className="btn" onClick={handleExport}>📄 导出 JSON</button>
                <div style={{ padding:12, background:'var(--bg-inset)', borderRadius:'var(--radius-sm)', fontSize:13, color:'var(--ink-secondary)' }}>数据存储在本地 SQLite 数据库中。</div>
              </div>
            </div>
          </div>

          <div className="anim-up anim-up-2" style={{ marginTop:20 }}>
            <button className="btn btn-accent" onClick={handleSave}>保存设置</button>
          </div>

          <div className="card anim-up anim-up-3" style={{ marginTop:20 }}>
            <div className="card-title">关于</div>
            <div style={{ fontSize:14, color:'var(--ink-secondary)', lineHeight:1.8 }}>
              <p style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:600 }}>一天 · Yi Tian</p>
              <p>v1.0.0 · 24小时生命画布</p>
              <p style={{ fontSize:12, color:'var(--ink-muted)', marginTop:8 }}>React 18 · Express.js · SQLite · Chart.js</p>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       App — Main Application
       ═══════════════════════════════════════════════ */

    function App() {
      const [page, setPage] = useState('today');
      const [time, setTime] = useState(new Date());
      const [showSearch, setShowSearch] = useState(false);
      const [activities, setActivities] = useState([]);

      useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
      useEffect(() => { api.getActivities().then(r => setActivities(r.data.activities)).catch(() => {}); }, []);

      // Cmd+K
      useEffect(() => {
        const handler = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setShowSearch(true); } };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const timeStr = time.toLocaleTimeString('zh-CN', { hour12: false });
      const dateStr = time.toLocaleDateString('zh-CN', { month:'short', day:'numeric' });

      const nav = [
        { id:'today', icon:'◉', label:'今天' },
        { id:'timeline', icon:'≡', label:'时间轴' },
        { id:'insights', icon:'◈', label:'洞察' },
        { id:'activities', icon:'▦', label:'活动库' },
        { id:'habits', icon:'◎', label:'习惯' },
        { id:'settings', icon:'⚙', label:'设置' },
      ];

      const titles = { today:'今天', timeline:'时间轴', insights:'洞察', activities:'活动库', habits:'习惯', settings:'设置' };

      return (
        <div className="app-layout">
          {/* Sidebar */}
          <nav className="sidebar">
            <div className="sidebar-brand">
              <div className="brand-icon">一</div>
              <span className="brand-text">一天</span>
            </div>
            <div className="sidebar-nav">
              {nav.map(n => (
                <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  <span className="nav-label">{n.label}</span>
                </div>
              ))}
            </div>
            <div className="sidebar-clock">
              <div className="clock-time">{timeStr}</div>
              <div className="clock-date">{dateStr}</div>
            </div>
          </nav>

          {/* Main */}
          <main className="main-content">
            {page === 'today' && <TodayPage />}
            {page === 'timeline' && <TimelinePage />}
            {page === 'insights' && <InsightsPage />}
            {page === 'activities' && <ActivitiesPage />}
            {page === 'habits' && <HabitsPage />}
            {page === 'settings' && <SettingsPage />}
          </main>

          <ToastBox />

          {showSearch && (
            <SearchOverlay
              activities={activities}
              onClose={() => setShowSearch(false)}
              onNavigate={(p) => setPage(p)}
            />
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       Mount
       ═══════════════════════════════════════════════ */

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
